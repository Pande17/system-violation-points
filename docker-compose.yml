services:
    app:
        build: ./backend
        platform: linux/amd64
        container_name: php-backend_html
        working_dir: /var/www/html
        volumes:
            - ./backend:/var/www/html
            # - ./backend/000-default.conf:/etc/apache2/sites-available/000-default.conf
        ports:
            - '8000:8000'
        environment:
            - TZ=Asia/Singapore
        depends_on:
            - db

    frontend:
        build: ./frontend
        platform: linux/amd64
        container_name: html-frontend
        working_dir: /app
        volumes:
            - ./frontend:/app
            - /app/node_modules
        ports:
            - '5173:5173'
        environment:
            - TZ=Asia/Singapore
        tty: true
        stdin_open: true
        # Menjalankan dev script (sudah berisi concurrent server dan tailwind)
        command: sh -c "npm run dev"
    db:
        image: mysql:8.0
        platform: linux/amd64
        container_name: db_mysql
        restart: always
        environment:
            - MYSQL_ROOT_PASSWORD=root
            - MYSQL_DATABASE=poin_pelanggaran_siswa
            - TZ=Asia/Singapore
        command: --default-time-zone='+08:00'
        ports:
            - '3306:3306'
        volumes:
            - db_data:/var/lib/mysql

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        platform: linux/amd64
        container_name: phpmyadmin_html
        restart: always
        ports:
            - '8080:80'
        environment:
            - PMA_HOST=db
            - PMA_USER=root
            - PMA_PASSWORD=root
            - TZ=Asia/Singapore
        depends_on:
            - db

volumes:
    db_data:

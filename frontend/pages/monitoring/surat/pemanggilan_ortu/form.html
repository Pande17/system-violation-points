<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Surat Pemanggilan Orang Tua - VioPoints</title>
    <link rel="icon" type="image/png" href="../../../../assets/img/viopoints.png">
    <link href="../../../../src/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f1f5f9; border-radius: 10px; }
        .dropdown-options { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
    </style>
</head>

<body class="flex h-screen overflow-hidden text-gray-800 bg-[#f8fafc]">
    <div id="sidebar-container"></div>
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <div id="header-container"></div>
        <div class="flex-1 overflow-y-auto p-8 relative">
            <div class="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-[#054030]/5 to-transparent pointer-events-none -z-10"></div>
            <div class="max-w-7xl mx-auto">
                <div class="mb-8">
                    <h2 class="text-3xl font-black text-gray-900 tracking-tight">Surat Pemanggilan Orang Tua</h2>
                    <p class="text-[13px] text-gray-500 mt-1 font-medium italic">Silakan lengkapi detail pertemuan di bawah ini.</p>
                </div>

                <div class="max-w-3xl mx-auto">
                    <div class="bg-white rounded-[24px] shadow-sm border border-gray-100 p-8 space-y-6">
                        <form id="cetakForm">
                            <div class="space-y-5">
                                <!-- Student Selection -->
                                <div>
                                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[2px] mb-2 ml-1">Pilih Siswa</label>
                                    <div class="relative" id="dropdown_siswa">
                                        <div class="dropdown-selected cursor-pointer w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl flex justify-between items-center transition-all text-[14px] font-bold text-gray-400 hover:border-emerald-400 hover:bg-white min-h-[60px]">
                                            <div class="flex items-center gap-3 w-full">
                                                <i class="fas fa-user-graduate text-gray-400 shrink-0"></i>
                                                <span class="selected-text truncate w-full text-center">Klik untuk pilih siswa...</span>
                                            </div>
                                            <i class="fas fa-chevron-down text-[10px] text-gray-400 transition-transform duration-200 dropdown-icon shrink-0"></i>
                                        </div>
                                        <div class="dropdown-options hidden absolute z-[100] left-0 right-0 top-full mt-2 bg-white border border-gray-100 shadow-2xl rounded-3xl overflow-hidden min-w-[200px] border-b-4 border-b-emerald-500/20">
                                            <div class="p-4 border-b border-gray-50 bg-gray-50/30">
                                                <div class="relative group">
                                                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 text-[13px] group-focus-within:text-emerald-500 transition-colors"></i>
                                                    <input type="text" id="siswa_search" placeholder="Cari nama atau NIS..." autocomplete="off" class="w-full pl-11 pr-4 py-3 bg-white border border-gray-200 rounded-2xl text-[13px] font-bold outline-none focus:border-emerald-400 focus:ring-4 focus:ring-emerald-500/10 transition-all">
                                                </div>
                                            </div>
                                            <div id="siswa_list" class="max-h-60 overflow-y-auto custom-scrollbar divide-y divide-gray-50"></div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Letter Details -->
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-2 ml-1 flex items-center justify-between">
                                            <span>Nomor Surat</span>
                                            <span class="text-[9px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold">OTOMATIS</span>
                                        </label>
                                        <input type="text" id="nomor_surat" placeholder="Kosongkan untuk otomatis..." class="w-full px-5 py-4 bg-white border-2 border-emerald-50 rounded-2xl text-[14px] font-bold text-gray-700 outline-none focus:border-emerald-400 transition-all font-mono">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-2 ml-1">Tanggal Pengiriman <span class="text-red-500">*</span></label>
                                        <input type="date" id="tanggal_pengiriman" class="w-full px-5 py-4 bg-white border-2 border-emerald-50 rounded-2xl text-[14px] font-bold text-gray-700 outline-none focus:border-emerald-400 transition-all" required>
                                    </div>
                                </div>

                                <div class="bg-emerald-50/30 p-6 rounded-3xl border border-emerald-100/50 space-y-4">
                                    <h3 class="text-[11px] font-black text-emerald-700 uppercase tracking-[2px] mb-2 flex items-center gap-2">
                                        <i class="fas fa-calendar-check mt-0.5"></i> Detail Pertemuan
                                    </h3>
                                    
                                    <div>
                                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Hari / Tanggal Pertemuan</label>
                                        <input type="text" id="hari_tanggal" placeholder="Contoh: Senin / 23 Maret 2026" class="w-full px-5 py-4 bg-white border border-gray-100 rounded-2xl text-[14px] font-bold text-gray-700 outline-none" required>
                                    </div>

                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Pukul</label>
                                            <input type="time" id="pukul" class="w-full px-5 py-4 bg-white border border-gray-100 rounded-2xl text-[14px] font-bold text-gray-700 outline-none" required>
                                        </div>
                                        <div>
                                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Tempat</label>
                                            <input type="text" id="tempat" value="SMK TI Bali Global Denpasar" class="w-full px-5 py-4 bg-white border border-gray-100 rounded-2xl text-[14px] font-bold text-gray-700 outline-none" required>
                                        </div>
                                    </div>

                                    <div>
                                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Keperluan</label>
                                        <input type="text" id="keperluan" placeholder="Contoh: Panggilan PENTING" class="w-full px-5 py-4 bg-white border border-gray-100 rounded-2xl text-[14px] font-bold text-gray-700 outline-none" required>
                                    </div>
                                </div>

                                <div class="pt-4">
                                    <button type="submit" class="w-full py-4 bg-[#054030] hover:bg-emerald-900 text-white rounded-2xl font-black text-xs uppercase tracking-[2px] shadow-xl transition-all flex items-center justify-center gap-3">
                                        <i class="fas fa-print"></i> KONFIRMASI & CETAK SURAT
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { loadComponents } from '../../../../components/layout.js';
        import { getAPI, postAPI } from '../../../../utils/fetchData.js';

        let dataSiswa = [];
        let selectedSiswa = null;

        document.addEventListener('DOMContentLoaded', async () => {
            // Cek Autentikasi
            const userStr = localStorage.getItem('user');
            const token = localStorage.getItem('token');
            if (!userStr || !token) {
                window.location.href = '../../../../login.html';
                return;
            }
            const user = JSON.parse(userStr);
            const role = user.role ? user.role.toLowerCase() : '';
            if (role !== 'kepala sekolah' && role !== 'wakasek' && role !== 'kepala_sekolah') {
                window.location.href = '../../../../login.html';
                return;
            }

            await loadComponents('../../../../');
            await fetchSiswa();
            setupDropdown();
            document.getElementById('tanggal_pengiriman').valueAsDate = new Date();
        });

        async function fetchSiswa() {
            try {
                const res = await getAPI('/siswa');
                if (res && res.status === 200) {
                    dataSiswa = res.data || [];
                    renderSiswaList(dataSiswa);
                }
            } catch (error) { console.error(error); }
        }

        function renderSiswaList(list) {
            const container = document.getElementById('siswa_list');
            container.innerHTML = list.map(s => `
                <div class="siswa-opt p-4 hover:bg-emerald-50/50 cursor-pointer flex items-center gap-4 group" data-id="${s.id}" data-nis="${s.nis}" data-nama="${s.nama}" data-kelas="${s.kelas}">
                    <div class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 group-hover:bg-emerald-100 group-hover:text-emerald-600 transition-colors">
                        <i class="fas fa-user-graduate text-sm"></i>
                    </div>
                    <div>
                        <p class="text-[13px] font-extrabold text-gray-800 tracking-tight">${s.nama}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">${s.nis} • ${s.kelas}</p>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.siswa-opt').forEach(opt => {
                opt.addEventListener('click', () => {
                    selectedSiswa = { id: opt.dataset.id, nama: opt.dataset.nama, nis: opt.dataset.nis, kelas: opt.dataset.kelas };
                    document.querySelector('#dropdown_siswa .selected-text').innerHTML = `<span class="uppercase tracking-widest font-black text-gray-900">${selectedSiswa.nama}</span>`;
                    toggleDropdown();
                });
            });
        }

        function setupDropdown() {
            document.querySelector('#dropdown_siswa .dropdown-selected').addEventListener('click', toggleDropdown);
            document.getElementById('siswa_search').addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase();
                const filtered = dataSiswa.filter(s => s.nama.toLowerCase().includes(val) || String(s.nis).includes(val));
                renderSiswaList(filtered);
            });

            document.getElementById('cetakForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!selectedSiswa) return alert("Pilih siswa terlebih dahulu!");

                const payload = {
                    id_siswa: selectedSiswa.id,
                    nomor_surat: document.getElementById('nomor_surat').value,
                    hari_tanggal: document.getElementById('hari_tanggal').value,
                    pukul: document.getElementById('pukul').value,
                    tempat: document.getElementById('tempat').value,
                    keperluan: document.getElementById('keperluan').value,
                    tanggal_pengiriman: document.getElementById('tanggal_pengiriman').value,
                    created_by: JSON.parse(localStorage.getItem('user'))?.id || 1
                };

                const res = await postAPI('/surat-pemanggilan-ortu', payload);
                if (res && res.status === 200) {
                    window.open(`http://localhost:8000/api/surat-pemanggilan-ortu?id=${res.data.id}&print=1`, '_blank');
                } else {
                    alert("Gagal menyimpan: " + (res.message || "Error"));
                }
            });
        }

        function toggleDropdown() {
            document.querySelector('#dropdown_siswa .dropdown-options').classList.toggle('hidden');
            document.querySelector('#dropdown_siswa .dropdown-icon').classList.toggle('rotate-180');
        }
    </script>
</body>
</html>

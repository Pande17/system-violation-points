<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Surat Pernyataan Siswa - VioPoints</title>
    <link rel="icon" type="image/png" href="../../../../assets/img/viopoints.png">
    <link href="../../../../src/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .letter-preview {
            font-family: 'Times New Roman', Times, serif;
            line-height: 1.5;
            color: #1a202c;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #f1f5f9;
            border-radius: 10px;
        }

        .dropdown-options {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden text-gray-800 bg-[#f8fafc]">

    <div id="sidebar-container"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <div id="header-container"></div>

        <div class="flex-1 overflow-y-auto p-8 relative">
            <div
                class="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-[#054030]/5 to-transparent pointer-events-none -z-10">
            </div>

            <div class="max-w-7xl mx-auto">
                <div class="mb-8 flex justify-between items-end">
                    <div>
                        <h2 class="text-3xl font-black text-gray-900 tracking-tight">Surat Pernyataan Siswa</h2>
                        <p class="text-[13px] text-gray-500 mt-1 font-medium italic">Lengkapi data di bawah ini untuk
                            mencetak surat pernyataan pembinaan.</p>
                    </div>
                </div>

                <div class="max-w-3xl mx-auto">
                    <!-- Form Section -->
                    <div class="space-y-6">
                        <div class="bg-white rounded-[24px] shadow-sm border border-gray-100 p-8 space-y-6">
                            <form id="cetakForm" action="cetak.php" method="POST" target="_blank">
                                <div class="space-y-5">
                                    <!-- Student Selection -->
                                    <div>
                                        <label
                                            class="block text-[10px] font-black text-gray-400 uppercase tracking-[2px] mb-2 ml-1">Cari
                                            & Pilih Siswa</label>
                                        <div class="relative" id="dropdown_siswa">
                                            <div
                                                class="dropdown-selected cursor-pointer w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl flex justify-between items-center transition-all text-[14px] font-bold text-gray-400 hover:border-emerald-400 hover:bg-white min-h-[60px]">
                                                <div class="flex items-center gap-3 w-full">
                                                    <i class="fas fa-user-graduate text-gray-400 shrink-0"></i>
                                                    <span class="selected-text truncate w-full text-center">Klik untuk
                                                        pilih siswa...</span>
                                                </div>
                                                <i
                                                    class="fas fa-chevron-down text-[10px] text-gray-400 transition-transform duration-200 dropdown-icon shrink-0"></i>
                                            </div>
                                            <div
                                                class="dropdown-options hidden absolute z-[100] left-0 right-0 top-full mt-2 bg-white border border-gray-100 shadow-2xl rounded-3xl overflow-hidden min-w-[200px] border-b-4 border-b-emerald-500/20">
                                                <div class="p-4 border-b border-gray-50 bg-gray-50/30">
                                                    <div class="relative group">
                                                        <i
                                                            class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 text-[13px] group-focus-within:text-emerald-500 transition-colors"></i>
                                                        <input type="text" id="siswa_search"
                                                            placeholder="Ketik nama atau NIS..." autocomplete="off"
                                                            class="w-full pl-11 pr-4 py-3 bg-white border border-gray-200 rounded-2xl text-[13px] font-bold outline-none focus:border-emerald-400 focus:ring-4 focus:ring-emerald-500/10 transition-all">
                                                    </div>
                                                </div>
                                                <div id="siswa_list"
                                                    class="max-h-80 overflow-y-auto custom-scrollbar divide-y divide-gray-50">
                                                    <!-- List populated via JS -->
                                                </div>
                                            </div>
                                            <input type="hidden" name="nis" id="input_nis">
                                        </div>
                                    </div>

                                    <!-- Parent Data Preview (Auto-filled) -->
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label
                                                class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Nama
                                                Orang Tua</label>
                                            <input type="text" id="parent_nama"
                                                class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-[14px] font-bold text-gray-700 outline-none"
                                                readonly>
                                        </div>
                                        <div>
                                            <label
                                                class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Pekerjaan</label>
                                            <input type="text" id="parent_job"
                                                class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-[14px] font-bold text-gray-700 outline-none"
                                                readonly>
                                        </div>
                                    </div>

                                    <div>
                                        <label
                                            class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Alamat
                                            Orang Tua</label>
                                        <textarea id="parent_address" rows="2"
                                            class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-[14px] font-bold text-gray-700 outline-none resize-none"
                                            readonly></textarea>
                                    </div>

                                    <!-- Manual Input -->
                                    <div>
                                        <label
                                            class="block text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-2 ml-1">Masalah
                                            / Pelanggaran <span class="text-red-500">*</span></label>
                                        <textarea name="masalah" id="masalah" rows="3"
                                            placeholder="Tuliskan alasan atau pelanggaran siswa..."
                                            class="w-full px-5 py-4 bg-white border-2 border-emerald-50 rounded-2xl text-[14px] font-bold text-gray-700 outline-none focus:border-emerald-400 focus:bg-emerald-50/10 transition-all resize-none"
                                            required></textarea>
                                    </div>

                                    <div>
                                        <label
                                            class="block text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-2 ml-1">Tanggal
                                            Keluar Surat <span class="text-red-500">*</span></label>
                                        <input type="date" id="tanggal_surat"
                                            class="w-full px-5 py-4 bg-white border-2 border-emerald-50 rounded-2xl text-[14px] font-bold text-gray-700 outline-none focus:border-emerald-400 focus:bg-emerald-50/10 transition-all"
                                            required>
                                    </div>

                                    <div class="pt-4">
                                        <button type="submit"
                                            class="w-full py-4 bg-[#054030] hover:bg-emerald-900 text-white rounded-2xl font-black text-xs uppercase tracking-[2px] shadow-xl shadow-emerald-900/10 transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                                            <i class="fas fa-print"></i> KONFIRMASI & CETAK SEKARANG
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { loadComponents } from '../../../../components/layout.js';
        import { getAPI, postAPI } from '../../../../utils/fetchData.js';

        let dataSiswa = [];
        let selectedSiswa = null;

        document.addEventListener('DOMContentLoaded', async () => {
            // Cek Autentikasi
            const userStr = localStorage.getItem('user');
            const token = localStorage.getItem('token');
            if (!userStr || !token) {
                window.location.href = '../../../../login.html';
                return;
            }
            const user = JSON.parse(userStr);
            const role = user.role ? user.role.toLowerCase() : '';
            if (role !== 'kepala sekolah' && role !== 'wakasek' && role !== 'kepala_sekolah') {
                window.location.href = '../../../../login.html';
                return;
            }

            await loadComponents('../../../../');
            await fetchSiswa();
            setupDropdown();

            // Set default date to today
            document.getElementById('tanggal_surat').valueAsDate = new Date();
        });

        async function fetchSiswa() {
            try {
                const res = await getAPI('/siswa');
                if (res && res.status === 200) {
                    dataSiswa = res.data || [];
                    renderSiswaList(dataSiswa);
                }
            } catch (error) { console.error(error); }
        }

        function renderSiswaList(list) {
            const container = document.getElementById('siswa_list');
            if (list.length === 0) {
                container.innerHTML = '<div class="p-4 text-center text-[11px] font-bold text-gray-400 italic">Siswa tidak ditemukan</div>';
                return;
            }
            container.innerHTML = list.map(s => `
                <div class="siswa-opt p-4 hover:bg-emerald-50/50 cursor-pointer border-b border-gray-50 flex items-center justify-between group transition-all" data-id="${s.id}" data-nis="${s.nis}">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 group-hover:bg-emerald-100 group-hover:text-emerald-600 transition-colors">
                            <i class="fas fa-user-graduate text-sm"></i>
                        </div>
                        <div>
                            <p class="text-[14px] font-extrabold text-gray-800 group-hover:text-emerald-700 transition-colors">${s.nama}</p>
                            <p class="text-[11px] text-gray-400 font-bold uppercase tracking-widest mt-0.5">${s.nis} • ${s.kelas}</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-[10px] text-gray-300 group-hover:text-emerald-500 transition-colors"></i>
                </div>
            `).join('');

            document.querySelectorAll('.siswa-opt').forEach(opt => {
                opt.addEventListener('click', async () => {
                    const nis = opt.dataset.nis;
                    await fetchSiswaByNIS(nis);
                    toggleDropdown();
                });
            });
        }

        async function fetchSiswaByNIS(nis) {
            console.log("Fetching via API for NIS:", nis);
            try {
                const res = await getAPI(`/siswa?nis=${nis}`);
                console.log("API Response:", res);

                if (res && res.status === 200) {
                    selectedSiswa = res.data;
                    document.getElementById('input_nis').value = selectedSiswa.nis;
                    document.getElementById('parent_nama').value = selectedSiswa.ortu_nama || '-';
                    document.getElementById('parent_job').value = selectedSiswa.ortu_pekerjaan || '-';
                    document.getElementById('parent_address').value = selectedSiswa.ortu_alamat || '-';

                    const selectedTextEl = document.querySelector('#dropdown_siswa .selected-text');
                    selectedTextEl.innerHTML = `<div class="text-center w-full uppercase tracking-widest font-black text-gray-900">${selectedSiswa.nama}</div>`;
                    selectedTextEl.classList.remove('text-gray-400');
                } else {
                    alert("Siswa tidak ditemukan di data pusat.");
                }
            } catch (error) {
                console.error("API Fetch Error:", error);
                alert("Gagal mengambil data dari server API.");
            }
        }

        function setupDropdown() {
            document.querySelector('#dropdown_siswa .dropdown-selected').addEventListener('click', toggleDropdown);
            document.getElementById('siswa_search').addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase();
                const filtered = dataSiswa.filter(s => s.nama.toLowerCase().includes(val) || String(s.nis).includes(val));
                renderSiswaList(filtered);
            });

            document.getElementById('cetakForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!selectedSiswa) {
                    alert("Pilih siswa dulu!");
                    return;
                }

                const payload = {
                    id_siswa: selectedSiswa.id,
                    tanggal: document.getElementById('tanggal_surat').value,
                    masalah: document.getElementById('masalah').value,
                    created_by: JSON.parse(localStorage.getItem('user'))?.id || 1
                };

                const saveRes = await postAPI('/surat-pernyataan-siswa', payload);
                if (saveRes && saveRes.status === 200) {
                    const printUrl = `http://localhost:8000/api/surat-pernyataan-siswa?id=${saveRes.data.id}&print=1`;
                    window.open(printUrl, '_blank');
                } else {
                    alert("Gagal menyimpan surat: " + (saveRes.message || "Unknown error"));
                }
            });
        }

        function toggleDropdown() {
            const menu = document.querySelector('#dropdown_siswa .dropdown-options');
            const icon = document.querySelector('#dropdown_siswa .dropdown-icon');
            menu.classList.toggle('hidden');
            icon.classList.toggle('rotate-180');
        }
    </script>
    </script>
</body>

</html>

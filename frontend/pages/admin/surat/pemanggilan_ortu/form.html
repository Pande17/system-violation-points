<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Surat Pemanggilan Orang Tua - VioPoints</title>
    <link rel="icon" type="image/png" href="../../../../assets/img/viopoints.png">
    <link href="../../../../src/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .letter-preview {
            font-family: 'Times New Roman', Times, serif;
            line-height: 1.5;
            color: #1a202c;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f1f5f9; border-radius: 10px; }
    </style>
</head>

<body class="flex h-screen overflow-hidden text-gray-800 bg-[#f8fafc]">

    <div id="sidebar-container"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <div id="header-container"></div>

        <div class="flex-1 overflow-y-auto p-8 relative">
            <div class="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-[#054030]/5 to-transparent pointer-events-none -z-10"></div>

            <div class="max-w-7xl mx-auto">
                <div class="mb-8 flex justify-between items-end">
                    <div>
                        <h2 class="text-3xl font-black text-gray-900 tracking-tight">Pemanggilan Orang Tua</h2>
                        <p class="text-[13px] text-gray-500 mt-1 font-medium italic">Lengkapi data untuk membuat surat panggilan orang tua/wali siswa.</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- Form Section -->
                    <div class="space-y-6">
                        <div class="bg-white rounded-[24px] shadow-sm border border-gray-100 p-8 space-y-6 text-center">
                            <form id="cetakForm" action="cetak.php" method="POST" target="_blank">
                                <div class="space-y-5 text-left">
                                    <!-- Student Selection -->
                                    <div>
                                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[2px] mb-2 ml-1">Cari & Pilih Siswa</label>
                                        <div class="relative" id="dropdown_siswa">
                                            <div class="dropdown-selected cursor-pointer w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl flex justify-between items-center transition-all text-[14px] font-bold text-gray-400 hover:border-emerald-400 hover:bg-white min-h-[60px]">
                                                <div class="flex items-center gap-3 w-full">
                                                    <i class="fas fa-user-graduate text-gray-400 shrink-0"></i>
                                                    <span class="selected-text truncate w-full text-center">Pilih siswa target...</span>
                                                </div>
                                                <i class="fas fa-chevron-down text-[10px] text-gray-400 transition-transform duration-200 dropdown-icon shrink-0"></i>
                                            </div>
                                            <div class="dropdown-options hidden absolute z-[100] left-0 right-0 top-full mt-2 bg-white border border-gray-100 shadow-2xl rounded-3xl overflow-hidden min-w-[200px] border-b-4 border-b-emerald-500/20">
                                                <div class="p-4 border-b border-gray-50 bg-gray-50/30">
                                                    <div class="relative group">
                                                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 text-[13px] group-focus-within:text-emerald-500 transition-colors"></i>
                                                        <input type="text" id="siswa_search" placeholder="Ketik nama atau NIS..." autocomplete="off" class="w-full pl-11 pr-4 py-3 bg-white border border-gray-200 rounded-2xl text-[13px] font-bold outline-none focus:border-emerald-400 focus:ring-4 focus:ring-emerald-500/10 transition-all">
                                                    </div>
                                                </div>
                                                <div id="siswa_list" class="max-h-80 overflow-y-auto custom-scrollbar divide-y divide-gray-50">
                                                    <!-- List populated via JS -->
                                                </div>
                                            </div>
                                            <input type="hidden" name="nis" id="input_nis">
                                        </div>
                                    </div>

                                    <!-- Meeting Info -->
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-2 ml-1">Hari & Tanggal <span class="text-red-500">*</span></label>
                                            <input type="text" name="meeting_date" id="meeting_date" placeholder="Senin, 06 April 2026" class="w-full px-5 py-4 bg-white border-2 border-emerald-50 rounded-2xl text-[14px] font-bold text-gray-700 outline-none focus:border-emerald-400 transition-all" required>
                                        </div>
                                        <div>
                                            <label class="block text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-2 ml-1">Waktu <span class="text-red-500">*</span></label>
                                            <input type="text" name="meeting_time" id="meeting_time" placeholder="10:00 WITA" class="w-full px-5 py-4 bg-white border-2 border-emerald-50 rounded-2xl text-[14px] font-bold text-gray-700 outline-none focus:border-emerald-400 transition-all" required>
                                        </div>
                                    </div>
                                    
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-2 ml-1">Tempat <span class="text-red-500">*</span></label>
                                            <input type="text" name="meeting_place" id="meeting_place" placeholder="Ruang Guru/BK" class="w-full px-5 py-4 bg-white border-2 border-emerald-50 rounded-2xl text-[14px] font-bold text-gray-700 outline-none focus:border-emerald-400 transition-all" required>
                                        </div>
                                        <div>
                                            <label class="block text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-2 ml-1">Keperluan <span class="text-red-500">*</span></label>
                                            <input type="text" name="meeting_purpose" id="meeting_purpose" placeholder="Panggilan Pembinaan" class="w-full px-5 py-4 bg-white border-2 border-emerald-50 rounded-2xl text-[14px] font-bold text-gray-700 outline-none focus:border-emerald-400 transition-all" required>
                                        </div>
                                    </div>

                                    <div class="pt-4">
                                        <button type="submit" class="w-full py-4 bg-[#054030] hover:bg-emerald-900 text-white rounded-2xl font-black text-xs uppercase tracking-[2px] shadow-xl shadow-emerald-900/10 transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                                            <i class="fas fa-print"></i> KONFIRMASI & CETAK SURAT
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Preview Section -->
                    <div class="h-full flex flex-col">
                        <div class="bg-gray-800 rounded-t-[24px] p-4 flex items-center justify-between">
                            <span class="text-[11px] font-black text-gray-400 uppercase tracking-widest ml-2">Live Preview Surat</span>
                            <div class="px-3 py-1 bg-gray-700 rounded-lg text-[10px] font-bold text-gray-300 italic">Format A4</div>
                        </div>
                        <div class="flex-1 bg-white shadow-2xl border-x border-b border-gray-100 p-8 overflow-y-auto custom-scrollbar rounded-b-[24px] letter-preview" id="previewArea">
                            <!-- Preview populated via JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { loadComponents } from '../../../../components/layout.js';
        import { getAPI } from '../../../../utils/fetchData.js';

        let dataSiswa = [];
        let selectedSiswa = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadComponents();
            await fetchSiswa();
            setupDropdown();
            setupLivePreview();
        });

        async function fetchSiswa() {
            try {
                const res = await getAPI('/siswa');
                if (res && res.status === 200) {
                    dataSiswa = res.data || [];
                    renderSiswaList(dataSiswa);
                }
            } catch (error) { console.error(error); }
        }

        function renderSiswaList(list) {
            const container = document.getElementById('siswa_list');
            if (list.length === 0) {
                container.innerHTML = '<div class="p-4 text-center text-[11px] font-bold text-gray-400 italic">Siswa tidak ditemukan</div>';
                return;
            }
            container.innerHTML = list.map(s => `
                <div class="siswa-opt p-4 hover:bg-emerald-50/50 cursor-pointer border-b border-gray-50 flex items-center justify-between group transition-all" data-nis="${s.nis}">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 group-hover:bg-emerald-100 group-hover:text-emerald-600 transition-colors">
                            <i class="fas fa-user-graduate text-sm"></i>
                        </div>
                        <div>
                            <p class="text-[14px] font-extrabold text-gray-800 group-hover:text-emerald-700 transition-colors">${s.nama}</p>
                            <p class="text-[11px] text-gray-400 font-bold uppercase tracking-widest mt-0.5">${s.nis} • ${s.kelas_nama || s.kelas}</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-[10px] text-gray-300 group-hover:text-emerald-500 transition-colors"></i>
                </div>
            `).join('');

            document.querySelectorAll('.siswa-opt').forEach(opt => {
                opt.addEventListener('click', async () => {
                    const nis = opt.dataset.nis;
                    await fetchSiswaDetail(nis);
                    toggleDropdown();
                });
            });
        }

        async function fetchSiswaDetail(nis) {
            try {
                const response = await fetch(`get_data.php?nis=${nis}`);
                const res = await response.json();
                if (res.status === 'success') {
                    selectedSiswa = res.data;
                    document.getElementById('input_nis').value = selectedSiswa.nis;
                    
                    const selectedTextEl = document.querySelector('#dropdown_siswa .selected-text');
                    selectedTextEl.innerHTML = `<div class="text-center w-full uppercase tracking-widest font-black text-gray-900">${selectedSiswa.nama_siswa}</div>`;
                    selectedTextEl.classList.remove('text-gray-400');
                    
                    updatePreview();
                }
            } catch (error) { console.error(error); }
        }

        function setupDropdown() {
            document.querySelector('#dropdown_siswa .dropdown-selected').addEventListener('click', toggleDropdown);
            document.getElementById('siswa_search').addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase();
                const filtered = dataSiswa.filter(s => s.nama.toLowerCase().includes(val) || String(s.nis).includes(val));
                renderSiswaList(filtered);
            });
        }

        function toggleDropdown() {
            const menu = document.querySelector('#dropdown_siswa .dropdown-options');
            const icon = document.querySelector('#dropdown_siswa .dropdown-icon');
            menu.classList.toggle('hidden');
            icon.classList.toggle('rotate-180');
        }

        function setupLivePreview() {
            ['meeting_date', 'meeting_time', 'meeting_place', 'meeting_purpose'].forEach(id => {
                document.getElementById(id).addEventListener('input', updatePreview);
            });
        }

        function updatePreview() {
            const area = document.getElementById('previewArea');
            if (!selectedSiswa) {
                area.innerHTML = '<div class="flex flex-col items-center justify-center h-full text-center text-gray-300 py-20"><i class="fas fa-file-invoice text-5xl opacity-20 mb-4"></i><p class="font-bold text-xs uppercase tracking-widest">Pilih siswa untuk preview</p></div>';
                return;
            }

            const getVal = (id) => document.getElementById(id).value || '..........';
            const fullDate = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

            area.innerHTML = `
                <div class="mb-5 -mx-4"><img src="../../../../assets/img/kop.jpeg" class="w-full"></div>
                <table class="w-full text-[13px] mb-8">
                    <tr><td class="w-20">No</td><td class="w-4">:</td><td>.../SMK/2026</td></tr>
                    <tr><td>Perihal</td><td>:</td><td class="font-bold underline">Pemanggilan Orang Tua / Wali Siswa</td></tr>
                </table>
                <p class="text-[13px] mb-6">Kepada Yth. Bapak/Ibu Orang Tua dari <strong>${selectedSiswa.nama_siswa}</strong> (${selectedSiswa.kelas}) di Tempat.</p>
                <p class="text-[13px] text-justify mb-4">Bersama surat ini, kami mengharapkan kehadiran Bapak/Ibu pada :</p>
                <table class="ml-8 text-[13px] mb-6">
                    <tr><td class="w-32 py-1">Hari / Tanggal</td><td class="w-4">:</td><td>${getVal('meeting_date')}</td></tr>
                    <tr><td class="py-1">Pukul</td><td>:</td><td>${getVal('meeting_time')}</td></tr>
                    <tr><td class="py-1">Tempat</td><td>:</td><td>${getVal('meeting_place')}</td></tr>
                    <tr><td class="py-1">Keperluan</td><td>:</td><td class="font-bold">${getVal('meeting_purpose')}</td></tr>
                </table>
                <p class="text-[13px] mb-4">Demikian surat ini kami sampaikan, atas perhatian dan kerjasamanya kami ucapkan terima kasih.</p>
                <div class="mt-12 flex justify-end">
                    <div class="text-center w-48 text-[13px]">
                        <p>Denpasar, ${fullDate}</p>
                        <p>Waka Kesiswaan / Guru BK,</p>
                        <div class="h-20"></div>
                        <p class="font-bold underline uppercase">( ............................ )</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Siswa - Sistem Poin Pelanggaran</title>
    <!-- Tailwind CSS Output -->
    <link href="../../src/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="flex h-screen overflow-hidden text-gray-800">

    <div id="sidebar-container"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <div id="header-container"></div>

        <div class="flex-1 overflow-y-auto p-8 relative">
            <div class="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-[#054030]/5 to-transparent pointer-events-none -z-10"></div>

            <div class="max-w-7xl mx-auto space-y-8">
                <!-- Header Section -->
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h2 class="text-3xl font-black text-gray-900 tracking-tight">Manajemen Data Siswa</h2>
                        <p class="text-gray-500 mt-1">Kelola informasi siswa, kelas, dan jurusan secara mudah.</p>
                    </div>
                    <button class="bg-[#054030] hover:bg-[#032e22] text-white px-5 py-2.5 rounded-xl font-medium flex items-center gap-2 transition-colors shadow-sm">
                        <i class="fas fa-plus"></i> Tambah Siswa Baru
                    </button>
                </div>

                <!-- Filters & Search -->
                <div class="bg-white p-4 rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-gray-100 flex flex-col md:flex-row gap-4 items-center justify-between">
                    <div class="relative w-full md:w-96">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="searchInput" placeholder="Cari nama, NIS, atau status..." class="w-full pl-11 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#054030] focus:border-transparent outline-none transition-all text-sm font-medium">
                    </div>
                </div>

                <!-- Table Container -->
                <div class="bg-white rounded-[24px] shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse whitespace-nowrap min-w-[900px]">
                            <thead>
                                <tr class="bg-gray-50/50 text-gray-500 text-xs uppercase tracking-widest border-b border-gray-100">
                                    <th class="py-5 px-6 font-bold text-center w-16">No</th>
                                    <th class="py-5 px-6 font-bold min-w-[250px]">Siswa</th>
                                    <th class="py-5 px-6 font-bold">Kontak</th>
                                    <th class="py-5 px-6 font-bold">Kelas/Jurusan</th>
                                    <th class="py-5 px-6 font-bold text-center">Status</th>
                                    <th class="py-5 px-6 font-bold text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="siswaTableBody" class="divide-y divide-gray-50">
                                <tr>
                                    <td colspan="6" class="py-12 text-center text-gray-400">
                                        <i class="fas fa-spinner fa-spin text-3xl mb-3 text-emerald-600"></i>
                                        <p class="text-sm font-medium">Memuat data siswa...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="footer-container"></div>
        </div>
    </main>

    <script type="module">
        import { loadComponents } from '../../components/layout.js';
        import { getAPI } from '../../utils/fetchData.js';

        let dataSiswa = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await loadComponents();
            await loadSiswa();

            document.getElementById('searchInput').addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase();
                const filtered = dataSiswa.filter(s => 
                    s.nama.toLowerCase().includes(keyword) || 
                    s.nis.toLowerCase().includes(keyword) ||
                    s.status.toLowerCase().includes(keyword)
                );
                renderTable(filtered);
            });
        });

        async function loadSiswa() {
            try {
                // Gunakan URL API yang sesuai untuk mengambil list siswa
                const res = await getAPI('/siswa');
                if (res && res.status === 200) {
                    dataSiswa = res.data;
                    renderTable(dataSiswa);
                } else {
                    renderError("Gagal mengambil data siswa.");
                }
            } catch(e) {
                console.error(e);
                renderError("Terjadi kesalahan koneksi.");
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('siswaTableBody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="py-8 text-center text-gray-500 font-medium">Belum ada data siswa.</td></tr>`;
                return;
            }

            let html = '';
            data.forEach((item, index) => {
                const isAktif = item.status === 'Aktif';
                html += `
                    <tr class="hover:bg-gray-50/80 transition-colors group">
                        <td class="py-4 px-6 text-center text-gray-500 font-semibold">${index + 1}</td>
                        <td class="py-4 px-6">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-600 font-bold border border-emerald-100 uppercase shrink-0">
                                    ${item.nama ? item.nama.charAt(0) : '-'}
                                </div>
                                <div>
                                    <p class="font-bold text-gray-900 group-hover:text-[#054030] transition-colors">${item.nama}</p>
                                    <p class="text-xs text-gray-500 font-medium mt-0.5"><span class="text-gray-400">NIS:</span> ${item.nis}</p>
                                </div>
                            </div>
                        </td>
                        <td class="py-4 px-6">
                            <p class="text-sm font-medium text-gray-700">${item.no_telp || '-'}</p>
                            <p class="text-xs text-gray-500">${item.email || '-'}</p>
                        </td>
                        <td class="py-4 px-6">
                            <div class="flex flex-col items-start gap-1">
                                <span class="px-2.5 py-1 bg-blue-50 text-blue-600 rounded-md text-[11px] font-bold tracking-wide">${item.kelas || '-'}</span>
                                <span class="text-xs text-gray-500 font-medium">${item.jurusan || '-'}</span>
                            </div>
                        </td>
                        <td class="py-4 px-6 text-center">
                            <span class="inline-flex px-3 py-1 rounded-full text-[11px] font-bold ${isAktif ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}">
                                ${isAktif ? '<i class="fas fa-check-circle mr-1 mt-0.5"></i> Aktif' : '<i class="fas fa-times-circle mr-1 mt-0.5"></i> Non-Aktif'}
                            </span>
                        </td>
                        <td class="py-4 px-6 text-center">
                            <div class="flex items-center justify-center gap-2">
                                <button class="w-8 h-8 rounded-lg bg-emerald-50 text-emerald-600 hover:bg-emerald-600 hover:text-white transition-colors flex items-center justify-center shadow-sm" title="Edit">
                                    <i class="fas fa-pen text-xs"></i>
                                </button>
                                <button class="w-8 h-8 rounded-lg bg-red-50 text-red-600 hover:bg-red-600 hover:text-white transition-colors flex items-center justify-center shadow-sm" title="Hapus">
                                    <i class="fas fa-trash text-xs"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function renderError(msg) {
            document.getElementById('siswaTableBody').innerHTML = `<tr><td colspan="6" class="py-8 text-center text-red-500 font-medium"><i class="fas fa-exclamation-triangle mr-2"></i> ${msg}</td></tr>`;
        }
    </script>
</body>
</html>

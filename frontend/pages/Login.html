<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Poin Pelanggaran</title>
    <!-- Tailwind CSS Output -->
    <link href="../src/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 h-screen flex items-center justify-center">

    <!-- Card Container -->
    <div
        class="bg-white m-4 p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.05)] w-full max-w-md border border-gray-100 transition-all">

        <!-- Logo Placeholder -->
        <div class="flex justify-center mb-6">
            <div
                class="h-16 w-16 bg-[#054030] rounded-2xl flex items-center justify-center shadow-lg shadow-[#054030]/20">
                <img src="../assets/img/gradepoint2.png" alt="Logo">
            </div>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Selamat Datang</h1>
            <p class="text-sm text-gray-500 mt-2">Masuk ke sistem poin pelanggaran</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#054030]/20 focus:border-[#054030] transition-colors bg-gray-50/50"
                    placeholder="Masukkan username">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#054030]/20 focus:border-[#054030] transition-colors bg-gray-50/50"
                    placeholder="Masukkan password">
            </div>

            <div id="errorMessage"
                class="text-red-600 text-sm hidden bg-red-50 p-3 rounded-xl border border-red-100 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span id="errorText">Username atau Password salah!</span>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-[#054030] hover:bg-[#043324] active:scale-[0.98] text-white font-medium py-3 rounded-xl transition-all shadow-md shadow-[#054030]/20 flex items-center justify-center gap-2">
                Masuk
            </button>
        </form>
    </div>

    <script type="module">
        import { postAPI } from '../utils/fetchData.js';

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // UI State loading
            errorMessage.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Memproses...
            `;

            try {
                // Endpoint API disesuaikan dengan Postman (route path api, misal: /login)
                const response = await postAPI('/login', {
                    username,
                    password
                });

                if (response.status === 200) {
                    // Simpan data token dan user
                    localStorage.setItem('token', response.data.token);
                    localStorage.setItem('user', JSON.stringify(response.data.user));

                    // Baca role dari response.data.user dan ubah ke huruf kecil untuk konsistensi
                    const role = response.data.user.role ? response.data.user.role.toLowerCase() : '';

                    // Redirect sesuai role
                    if (role === 'admin') {
                        window.location.href = './admin/dashboard.html';
                    } else if (role === 'guru') {
                        window.location.href = './guru/dashboard.html';
                    } else if (role === 'kepala sekolah' || role === 'kepala_sekolah' || role === 'wakasek') {
                        window.location.href = './monitoring/dashboard.html';
                    } else if (role === 'siswa') {
                        window.location.href = './siswa/dashboard.html';
                    } else {
                        // Fallback atau bisa ditambahkan error handling jika role tidak dikenali
                        window.location.href = '404NotFound.html';
                    }
                } else {
                    errorText.textContent = response.message || 'Username atau password salah.';
                    errorMessage.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Login error:", error);
                errorText.getContext = 'Gagal terhubung ke server.';
                errorMessage.classList.remove('hidden');
            } finally {
                // Reset UI state
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Masuk';
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Tidak Ditemukan - VioPoints</title>
    <meta name="description" content="Halaman yang Anda cari tidak ditemukan atau Anda tidak memiliki akses.">
    <link rel="icon" type="image/png" href="../assets/img/viopoints.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            animation: blobFloat 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        .bg-blob-1 {
            width: 500px; height: 500px;
            background: #054030;
            top: -100px; left: -100px;
            animation-delay: 0s;
        }
        .bg-blob-2 {
            width: 400px; height: 400px;
            background: #10b981;
            bottom: -80px; right: -80px;
            animation-delay: 3s;
        }
        .bg-blob-3 {
            width: 300px; height: 300px;
            background: #6366f1;
            top: 50%; right: 15%;
            animation-delay: 5s;
        }

        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -20px) scale(1.05); }
            66% { transform: translate(-15px, 15px) scale(0.95); }
        }

        /* Grid dots background */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.4;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 520px;
            padding: 24px;
            text-align: center;
        }

        /* Big number */
        .error-number {
            font-size: clamp(100px, 20vw, 160px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -8px;
            background: linear-gradient(135deg, #054030 0%, #10b981 50%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            animation: numberPulse 3s ease-in-out infinite;
            user-select: none;
        }

        .error-number.unauthorized {
            background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 50%, #6d28d9 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }

        @keyframes numberPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* Icon circle */
        .icon-wrapper {
            width: 80px; height: 80px;
            border-radius: 24px;
            background: linear-gradient(135deg, #054030, #10b981);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 32px;
            color: white;
            box-shadow: 0 12px 40px rgba(5, 64, 48, 0.3);
            animation: iconBounce 2s ease-in-out infinite;
        }

        .icon-wrapper.unauthorized {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            box-shadow: 0 12px 40px rgba(124, 58, 237, 0.3);
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Card */
        .card {
            background: white;
            border-radius: 28px;
            padding: 48px 40px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            border: 1px solid rgba(241, 245, 249, 1);
            animation: cardSlideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes cardSlideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: #f0fdf4;
            color: #054030;
            border: 1px solid #d1fae5;
            margin-bottom: 20px;
        }

        .badge.unauthorized {
            background: #f5f3ff;
            color: #6d28d9;
            border-color: #ede9fe;
        }

        .title {
            font-size: 26px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 14px;
            color: #64748b;
            line-height: 1.7;
            margin-bottom: 36px;
            font-weight: 500;
        }

        .highlight {
            color: #054030;
            font-weight: 700;
        }

        .highlight.unauthorized { color: #7c3aed; }

        /* Buttons */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: #054030;
            color: white;
            box-shadow: 0 4px 16px rgba(5, 64, 48, 0.25);
            text-decoration: none;
            margin-bottom: 10px;
        }

        .btn-primary:hover {
            background: #032e22;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(5, 64, 48, 0.35);
        }

        .btn-primary:active { transform: scale(0.98); }

        .btn-primary.unauthorized {
            background: #7c3aed;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.25);
        }

        .btn-primary.unauthorized:hover {
            background: #6d28d9;
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.35);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 24px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: 1.5px solid #e2e8f0;
            background: transparent;
            color: #475569;
            text-decoration: none;
        }

        .btn-secondary:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            color: #1e293b;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 6px 0;
            color: #cbd5e1;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #f1f5f9;
        }

        /* URL path info */
        .path-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 28px;
            padding: 10px 16px;
            background: #f8fafc;
            border-radius: 10px;
            border: 1px solid #f1f5f9;
        }

        .path-info .path-label {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            flex-shrink: 0;
        }

        .path-info .path-value {
            font-size: 12px;
            font-weight: 700;
            color: #475569;
            font-family: ui-monospace, monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Role badge in path info */
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            background: #f0fdf4;
            color: #054030;
            border: 1px solid #d1fae5;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat linear infinite;
            opacity: 0.15;
        }
        @keyframes particleFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        /* Logo */
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 32px;
        }
        .logo-area img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        .logo-area span {
            font-size: 16px;
            font-weight: 800;
            color: #054030;
            letter-spacing: -0.5px;
        }
    </style>
</head>

<body>
    <!-- Background -->
    <div class="bg-grid"></div>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Logo -->
        <div class="logo-area">
            <img src="../assets/img/viopoints.png" alt="VioPoints" onerror="this.style.display='none'">
            <span>VioPoints</span>
        </div>

        <div class="card" id="mainCard">
            <!-- Icon -->
            <div class="icon-wrapper" id="iconWrapper">
                <i class="fas fa-map-signs" id="mainIcon"></i>
            </div>

            <!-- Error Number -->
            <div class="error-number" id="errorNumber">404</div>

            <!-- Badge -->
            <div class="badge" id="errorBadge">
                <i class="fas fa-circle-xmark"></i>
                <span id="badgeText">Halaman Tidak Ditemukan</span>
            </div>

            <!-- Title & Subtitle -->
            <h1 class="title" id="mainTitle">Ups! Halaman tidak ada</h1>
            <p class="subtitle" id="mainSubtitle">
                Halaman yang Anda cari tidak ditemukan. Mungkin URL salah ketik atau halaman telah dipindahkan.
            </p>

            <!-- Buttons -->
            <a href="#" class="btn-primary" id="primaryBtn" onclick="goToDashboard(event)">
                <i class="fas fa-house"></i>
                <span id="primaryBtnText">Kembali ke Dashboard</span>
            </a>

            <div class="divider">atau</div>

            <a href="#" class="btn-secondary" id="secondaryBtn" onclick="goBack(event)">
                <i class="fas fa-arrow-left"></i>
                <span>Kembali ke Halaman Sebelumnya</span>
            </a>

            <!-- Path info -->
            <div class="path-info" id="pathInfo" style="display:none">
                <span class="path-label">URL</span>
                <span class="path-value" id="pathValue"></span>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // KONFIGURASI DASHBOARD PER ROLE
        // ============================================================
        const ROLE_DASHBOARD = {
            'kepala_sekolah': '../pages/admin/dashboard.html',
            'wakasek':        '../pages/admin/dashboard.html',
            'guru_mapel':     '../pages/guru/dashboard.html',
            'bk':             '../pages/guru/dashboard.html',
            'siswa':          '../pages/siswa/dashboard.html',
        };

        // Nama tampilan role
        const ROLE_LABELS = {
            'kepala_sekolah': 'Kepala Sekolah',
            'wakasek':        'Wakasek',
            'guru_mapel':     'Guru Mapel',
            'bk':             'Guru BK',
            'siswa':          'Siswa',
        };

        // ============================================================
        // BACA URL PARAMS & USER DATA
        // ============================================================
        const params  = new URLSearchParams(window.location.search);
        const errType = params.get('type') || 'not_found';   // 'not_found' | 'unauthorized'
        const fromUrl = params.get('from') || '';             // URL asal (opsional)

        let userRole = null;
        let userName = null;
        try {
            const ud = localStorage.getItem('user');
            if (ud) {
                const parsed = JSON.parse(ud);
                userRole = parsed.role || null;
                userName = parsed.nama || null;
            }
        } catch (e) {}

        // ============================================================
        // UPDATE UI SESUAI TIPE ERROR
        // ============================================================
        function applyErrorUI() {
            const isUnauth = errType === 'unauthorized';
            const iconWrapper = document.getElementById('iconWrapper');
            const errorNumber = document.getElementById('errorNumber');
            const badge = document.getElementById('errorBadge');
            const badgeText = document.getElementById('badgeText');
            const title = document.getElementById('mainTitle');
            const subtitle = document.getElementById('mainSubtitle');
            const primaryBtn = document.getElementById('primaryBtn');
            const primaryBtnText = document.getElementById('primaryBtnText');
            const blob1 = document.querySelector('.bg-blob-1');
            const blob2 = document.querySelector('.bg-blob-2');

            if (isUnauth) {
                // === UNAUTHORIZED (403) ===
                errorNumber.textContent = '403';
                errorNumber.classList.add('unauthorized');
                iconWrapper.classList.add('unauthorized');
                iconWrapper.innerHTML = '<i class="fas fa-shield-halved"></i>';
                badge.classList.add('unauthorized');
                badgeText.textContent = 'Akses Ditolak';
                badge.querySelector('i').className = 'fas fa-ban';

                const roleLabel = userRole ? ROLE_LABELS[userRole] || userRole : null;
                title.innerHTML = 'Anda tidak punya akses ke sini';
                subtitle.innerHTML = roleLabel
                    ? `Maaf, <span class="highlight unauthorized">${userName || 'Anda'}</span> dengan peran <span class="highlight unauthorized">${roleLabel}</span> tidak diizinkan mengakses halaman ini. Silakan kembali ke dashboard Anda.`
                    : 'Anda tidak memiliki izin untuk mengakses halaman ini. Silakan login dengan akun yang sesuai.';

                primaryBtn.classList.add('unauthorized');
                primaryBtnText.textContent = 'Ke Dashboard Saya';
                blob1.style.background = '#7c3aed';
                blob2.style.background = '#a78bfa';
            } else {
                // === NOT FOUND (404) ===
                const roleLabel = userRole ? ROLE_LABELS[userRole] || userRole : null;
                subtitle.innerHTML = roleLabel
                    ? `Halaman yang Anda cari tidak ditemukan. Mungkin URL salah ketik atau halaman telah dipindahkan. Anda login sebagai <span class="highlight">${roleLabel}</span>.`
                    : 'Halaman yang Anda cari tidak ditemukan. Mungkin URL salah ketik atau halaman telah dipindahkan.';
            }

            // Tampilkan info URL asal
            if (fromUrl) {
                const pathInfo = document.getElementById('pathInfo');
                const pathValue = document.getElementById('pathValue');
                pathValue.textContent = decodeURIComponent(fromUrl);
                pathInfo.style.display = 'flex';
            }

            // Update tombol primary jika tidak ada role (belum login)
            if (!userRole) {
                primaryBtnText.textContent = 'Login';
                primaryBtn.onclick = function(e) {
                    e.preventDefault();
                    window.location.href = '../pages/Login.html';
                };
            }
        }

        // ============================================================
        // NAVIGASI
        // ============================================================
        function goToDashboard(e) {
            e.preventDefault();
            if (!userRole) {
                window.location.href = '../pages/Login.html';
                return;
            }
            const dest = ROLE_DASHBOARD[userRole];
            if (dest) {
                window.location.href = dest;
            } else {
                window.location.href = '../pages/Login.html';
            }
        }

        function goBack(e) {
            e.preventDefault();
            if (window.history.length > 1) {
                window.history.back();
            } else {
                goToDashboard(e);
            }
        }

        // ============================================================
        // PARTICLES ANIMATION
        // ============================================================
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#054030', '#10b981', '#6366f1', '#f59e0b'];
            const sizes = [6, 8, 10, 12, 14];
            const count = 18;

            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = sizes[Math.floor(Math.random() * sizes.length)];
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100;
                const duration = 8 + Math.random() * 10;
                const delay = Math.random() * 12;

                p.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    background: ${color};
                    left: ${left}%;
                    bottom: -20px;
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                `;
                container.appendChild(p);
            }
        }

        // ============================================================
        // INIT
        // ============================================================
        applyErrorUI();
        createParticles();
    </script>
</body>

</html>

<header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-8 flex-shrink-0 z-10 sticky top-0">
    <div class="flex items-center gap-4">
        <button id="burgerBtn"
            class="w-10 h-10 rounded-xl border border-gray-200 text-gray-500 hover:text-[#054030] hover:bg-emerald-50 transition-colors flex items-center justify-center">
            <i class="fas fa-bars"></i>
        </button>
        <h2 id="pageTitle" class="font-extrabold text-xl text-gray-800 tracking-tight hidden md:block">Overview</h2>
    </div>

    <div class="flex items-center gap-6">
        <div class="h-8 w-px bg-gray-200"></div>

        <!-- User Profile -->
        <div class="flex items-center gap-3 cursor-pointer p-1.5 pr-3 rounded-full hover:bg-gray-50 border border-transparent hover:border-gray-100 transition-all">
            <div class="w-9 h-9 rounded-full bg-[#054030] flex items-center justify-center text-white font-bold shadow-sm">
                <i class="fas fa-user-shield text-sm"></i>
            </div>
            <div class="hidden md:block">
                <p class="text-sm font-bold text-gray-900" id="adminName">Administrator</p>
                <p class="text-[11px] text-emerald-600 font-medium tracking-wide">Admin Role</p>
            </div>
            <i class="fas fa-chevron-down text-[10px] text-gray-400 ml-1"></i>
        </div>
    </div>
</header>

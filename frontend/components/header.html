<header
    class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-8 flex-shrink-0 z-10 sticky top-0">
    <div class="flex items-center gap-4">
        <button id="burgerBtn"
            class="w-10 h-10 rounded-xl border border-gray-200 text-gray-500 hover:text-[#054030] hover:bg-emerald-50 transition-colors flex items-center justify-center">
            <i class="fas fa-bars"></i>
        </button>
        <h2 id="pageTitle" class="font-extrabold text-xl text-gray-800 tracking-tight hidden md:block">Overview</h2>
    </div>

    <div class="flex items-center gap-6">
        <div class="h-8 w-px bg-gray-200"></div>

        <!-- User Profile -->
        <div id="userProfileBtn"
            class="flex items-center gap-3 cursor-pointer p-1.5 pr-3 rounded-full hover:bg-gray-50 border border-transparent hover:border-gray-100 transition-all">
            <div
                class="w-9 h-9 rounded-full bg-[#054030] flex items-center justify-center text-white font-bold shadow-sm">
                <i class="fas fa-user-shield text-sm"></i>
            </div>
            <div class="hidden md:block">
                <p class="text-sm font-bold text-gray-900" id="adminName">User</p>
            </div>
            <i class="fas fa-chevron-down text-[10px] text-gray-400 ml-1"></i>
        </div>
    </div>
</header>

<!-- Backdrop Blur Overlay (Global) -->
<div id="modalOverlay" class="fixed inset-0 bg-gray-900/60 hidden opacity-0 transition-opacity duration-300"
    style="z-index: 9990; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);"></div>

<!-- Modal Profil (Popup Style) -->
<div id="profileModal" class="fixed inset-0 hidden items-center justify-center p-3 sm:p-4 transition-all duration-300"
    style="z-index: 9991;">
    <div
        class="bg-white rounded-2xl sm:rounded-[32px] shadow-2xl w-full max-w-lg overflow-hidden transform scale-90 opacity-0 transition-all duration-300 flex flex-col max-h-[90vh] sm:max-h-[85vh] border border-gray-100">
        <!-- Modal Header -->
        <div
            class="px-6 sm:px-10 py-6 sm:py-7 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 z-10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-600">
                    <i class="fas fa-user-circle text-2xl"></i>
                </div>
                <div>
                    <h3 class="font-black text-gray-900 text-xl tracking-tight leading-none">Profil Saya</h3>
                    <p class="text-[11px] text-gray-400 font-bold uppercase tracking-widest mt-1.5">Informasi Akun</p>
                </div>
            </div>
            <button type="button" id="closeProfileBtn"
                class="w-10 h-10 rounded-xl bg-gray-50 text-gray-400 hover:text-red-500 hover:bg-red-50 transition-all focus:outline-none flex items-center justify-center">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <!-- Modal Body (Scrollable) -->
        <div class="p-6 sm:p-10 space-y-8 sm:space-y-10 overflow-y-auto flex-1 custom-scrollbar bg-white">
            <!-- Section: Data Login -->
            <div class="space-y-4">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-1.5 h-4 bg-emerald-500 rounded-full"></span>
                    <h4 class="text-xs font-black text-gray-900 uppercase tracking-wider">Akses Login</h4>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="group">
                        <label
                            class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1 transition-colors group-focus-within:text-emerald-600">Username</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                            <input type="text" id="profileUsername"
                                class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 focus:bg-white outline-none transition-all text-sm font-bold text-gray-700"
                                placeholder="Username">
                        </div>
                    </div>
                    <div class="group">
                        <label
                            class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1 transition-colors group-focus-within:text-emerald-600">Kata
                            Sandi Baru</label>
                        <div class="relative">
                            <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                            <input type="password" id="profilePassword"
                                class="w-full pl-11 pr-12 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 focus:bg-white outline-none transition-all text-sm font-bold text-gray-700"
                                placeholder="Kosongkan jika tdk diubah">
                            <button type="button" id="toggleProfilePassword"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-emerald-600 transition-colors">
                                <i class="fas fa-eye text-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Section: Data Pribadi -->
            <div class="space-y-4 pt-4 border-t border-gray-50">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-1.5 h-4 bg-emerald-500 rounded-full"></span>
                    <h4 class="text-xs font-black text-gray-900 uppercase tracking-wider">Identitas Diri</h4>
                </div>

                <div class="space-y-4">
                    <div class="group">
                        <label
                            class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Nama
                            Lengkap</label>
                        <input type="text" id="profileNama"
                            class="w-full px-5 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 focus:bg-white transition-all text-sm font-bold text-gray-700">
                    </div>

                    <!-- Guru Section -->
                    <div id="guruOnlyFields" class="hidden grid grid-cols-2 gap-4">
                        <div>
                            <label
                                class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Kode
                                Guru</label>
                            <div
                                class="px-5 py-3.5 bg-gray-100 border border-gray-200 rounded-2xl text-sm font-bold text-gray-500 cursor-not-allowed">
                                <input type="text" id="profileKodeGuru"
                                    class="bg-transparent border-none w-full p-0 outline-none" readonly>
                            </div>
                        </div>
                        <div>
                            <label
                                class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Jabatan</label>
                            <div
                                class="px-5 py-3.5 bg-gray-100 border border-gray-200 rounded-2xl text-sm font-bold text-gray-500 cursor-not-allowed">
                                <input type="text" id="profileRole"
                                    class="bg-transparent border-none w-full p-0 outline-none" readonly>
                            </div>
                        </div>
                    </div>

                    <!-- Siswa Section -->
                    <div id="siswaOnlyFields" class="hidden space-y-4">
                        <div class="grid grid-cols-3 gap-3">
                            <div>
                                <label
                                    class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">NIS</label>
                                <div
                                    class="px-4 py-3.5 bg-gray-100 border border-gray-200 rounded-2xl text-[13px] font-bold text-gray-500 text-center cursor-not-allowed">
                                    <input type="text" id="profileNIS"
                                        class="bg-transparent border-none w-full p-0 outline-none text-center" readonly>
                                </div>
                            </div>
                            <div>
                                <label
                                    class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Kelas</label>
                                <input type="text" id="profileKelas"
                                    class="w-full px-4 py-3.5 bg-gray-100 border border-gray-200 rounded-2xl text-[13px] font-bold text-gray-500 text-center"
                                    readonly>
                            </div>
                            <div>
                                <label
                                    class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Jurusan</label>
                                <input type="text" id="profileJurusan"
                                    class="w-full px-4 py-3.5 bg-gray-100 border border-gray-200 rounded-2xl text-[13px] font-bold text-gray-500 text-center"
                                    readonly>
                            </div>
                        </div>
                    </div>

                    <div class="group">
                        <label
                            class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Alamat
                            Email</label>
                        <input type="email" id="profileEmail"
                            class="w-full px-5 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 focus:bg-white transition-all text-sm font-bold text-gray-700">
                    </div>

                    <div id="siswaAddressField" class="hidden group">
                        <label
                            class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Alamat
                            Lengkap</label>
                        <textarea id="profileAlamat" rows="3"
                            class="w-full px-5 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 focus:bg-white transition-all text-sm font-bold text-gray-700 resize-none"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Footer -->
        <div
            class="px-6 sm:px-10 py-5 sm:py-7 bg-white border-t border-gray-50 flex flex-col-reverse sm:flex-row items-center justify-end gap-3 sm:gap-4 sticky bottom-0 z-10 w-full">
            <button type="button" id="cancelProfileBtn"
                class="w-full sm:w-auto px-6 py-3.5 font-black text-gray-400 hover:text-gray-600 transition-all text-xs uppercase tracking-widest bg-gray-50 sm:bg-transparent rounded-2xl sm:rounded-none">Batal</button>
            <button type="button" id="saveProfileBtn"
                class="w-full sm:w-auto px-8 py-3.5 font-black text-white bg-[#054030] hover:bg-[#0a6148] rounded-2xl transition-all text-xs uppercase tracking-widest shadow-xl shadow-emerald-900/20 active:scale-95">Simpan
                Perubahan</button>
        </div>
    </div>
</div>

<!-- Custom Confirmation Modal (Z-Index Paling Atas) -->
<div id="confirmModal" class="fixed inset-0 hidden items-center justify-center p-4 transition-all duration-300"
    style="z-index: 9999;">
    <!-- Extra Backdrop for Double Blur Effect -->
    <div id="confirmOverlay" class="absolute inset-0 bg-gray-900/70 opacity-0 transition-opacity duration-300"
        style="backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);"></div>

    <div
        class="bg-white rounded-[40px] shadow-2xl p-8 sm:p-10 max-w-sm w-full text-center transform scale-90 opacity-0 transition-all duration-300 relative z-10">
        <div
            class="w-20 h-20 sm:w-24 sm:h-24 bg-amber-50 text-amber-500 rounded-3xl sm:rounded-[32px] flex items-center justify-center mx-auto mb-6 sm:mb-8 shadow-inner ring-4 ring-amber-50/50">
            <i class="fas fa-exclamation-triangle text-3xl sm:text-4xl"></i>
        </div>
        <h3 class="text-xl sm:text-2xl font-black text-gray-900 mb-3 sm:mb-4 tracking-tight leading-tight">Simpan Data?
        </h3>
        <p class="text-xs sm:text-sm font-medium text-gray-500 leading-relaxed mb-8 sm:mb-10 px-2 sm:px-4">Pastikan
            semua data yang diinput sudah
            benar sebelum disimpan ke sistem.</p>
        <div class="flex flex-col gap-3">
            <button type="button" id="proceedConfirmBtn"
                class="w-full py-3.5 sm:py-4 font-black text-white bg-emerald-600 hover:bg-emerald-700 rounded-2xl transition-all text-[11px] sm:text-xs uppercase tracking-widest shadow-lg shadow-emerald-600/30 active:scale-95">Ya,
                Konfirmasi</button>
            <button type="button" id="cancelConfirmBtn"
                class="w-full py-3.5 sm:py-4 font-black text-gray-400 hover:text-gray-600 bg-gray-50 sm:bg-transparent rounded-2xl sm:rounded-none transition-all text-[11px] sm:text-xs uppercase tracking-widest">Kembali</button>
        </div>
    </div>
</div>

<style>
    .custom-scrollbar::-webkit-scrollbar {
        width: 5px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #f1f5f9;
        border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #e2e8f0;
    }
</style>
